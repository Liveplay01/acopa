<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACOPA Admin – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-login-page">

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-header">
        <img src="/assets/AcopaLogo.png" alt="ACOPA" class="login-logo">
        <p class="login-subtitle">Content Management</p>
      </div>

      <form class="login-form" method="POST" action="/admin/login">
        <div class="a-form-field">
          <label class="a-label" for="password">Passwort</label>
          <input
            class="a-input"
            id="password"
            name="password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            autofocus
            required
          >
        </div>

        <button class="a-btn a-btn-primary login-submit" type="submit">
          Anmelden
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </form>

      <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === '1') {
          const err = document.createElement('p');
          err.className = 'login-error';
          err.textContent = 'Falsches Passwort. Bitte versuchen Sie es erneut.';
          document.querySelector('.login-form').prepend(err);
        }
      </script>
    </div>

    <p class="login-back">
      <a href="/">&larr; Zurück zur Website</a>
    </p>
  </div>

</body>
</html>
